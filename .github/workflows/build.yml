name: Build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Gradle validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare Gradle wrapper
        shell: bash
        run: chmod +x ./gradlew

      - name: Compile Java and process resources
        shell: bash
        run: ./gradlew compileJava processResources --stacktrace

      - name: Run tests
        shell: bash
        run: ./gradlew test --stacktrace

      - name: Build
        shell: bash
        run: ./gradlew build --stacktrace

      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: mod-jars
          path: |
            build/libs/*.jar
            gradle-project/build/libs/*.jar
          if-no-files-found: error
